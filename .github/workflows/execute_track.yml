# This is a generic workflow to execute any skill track.

name: Execute Conductor Track

on:
  workflow_dispatch:
    inputs:
      skill_name:
        description: 'The name of the skill to execute (e.g., pr_creator).'
        required: true
        type: string
      jira_ticket_id:
        description: 'The Jira ticket ID to process.'
        required: true
        type: string

jobs:
  execute-track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Set up GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Track
        id: create_track
        run: |
          # Make script executable
          chmod +x ./scripts/create_track.sh
          # Run the script and capture the TRACK_ID from its output
          output=$(./scripts/create_track.sh ${{ inputs.skill_name }} ${{ inputs.jira_ticket_id }})
          echo "$output"
          track_id=$(echo "$output" | grep 'Track ID:' | awk '{print $3}')
          echo "track_id=$track_id" >> $GITHUB_OUTPUT

      - name: Execute Track Plan
        run: |
          echo "Executing plan for Track ID: ${{ steps.create_track.outputs.track_id }}"
          # Load secrets into environment
          export GCP_PROJECT_ID='${{ secrets.GCP_PROJECT_ID }}'
          export JIRA_BASE_URL='${{ secrets.JIRA_BASE_URL }}'
          export JIRA_USERNAME='${{ secrets.JIRA_USERNAME }}'
          export JIRA_API_TOKEN='${{ secrets.JIRA_API_TOKEN }}'

          # Run the conductor
          ./gradlew :conductor:run --args="--track-id ${{ steps.create_track.outputs.track_id }}"
