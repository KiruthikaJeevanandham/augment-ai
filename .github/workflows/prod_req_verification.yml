# Run the prod requirement verification gate as a dedicated workflow.

name: Prod Requirement Verification Gate
permissions:
  contents: read

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo to verify (owner/repo).'
        required: true
        default: 'PeopleNet/instinct-maine-forms-workflow-app'
        type: string
      jira_ticket_id:
        description: 'The Jira ticket ID to verify against the code changes. If not provided, will be extracted from branch name.'
        required: false
        type: string
      tech_stack:
        description: 'Tech stack hint for verification (e.g., android, java, node, python).'
        required: false
        default: 'unspecified'
        type: string
      base_ref:
        description: 'Git base ref to compare against.'
        required: false
        default: 'origin/develop'
        type: string
      head_ref:
        description: 'Git head ref to compare.'
        required: false
        default: 'HEAD'
        type: string
  
  # Auto-trigger on push to feature branches
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'chore/**'
      - 'hotfix/**'
    branches-ignore:
      - 'develop'
      - 'release'
      - 'main'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'

jobs:
  verify-prod-req:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract Jira Ticket from Branch Name
        id: extract_jira
        run: |
          # For workflow_dispatch, use input or extract from head_ref
          # For push events, extract from the pushed branch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            JIRA_TICKET="${{ inputs.jira_ticket_id }}"
            BRANCH_NAME="${{ inputs.head_ref }}"
            TARGET_REPO="${{ inputs.target_repo }}"
          else
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            TARGET_REPO="${{ github.repository }}"
            JIRA_TICKET=""
          fi
          
          # Extract Jira ticket from branch name if not provided
          if [ -z "$JIRA_TICKET" ]; then
            JIRA_TICKET=$(echo "$BRANCH_NAME" | grep -oE '[A-Z]+-[0-9]+' | head -n 1)
          fi
          
          if [ -z "$JIRA_TICKET" ]; then
            echo "Error: Could not extract Jira ticket ID from branch name '$BRANCH_NAME'" >&2
            echo "Branch name should contain a Jira ticket ID (e.g., PROJ-123)" >&2
            exit 1
          fi
          
          echo "jira_ticket=$JIRA_TICKET" >> $GITHUB_OUTPUT
          echo "target_repo=$TARGET_REPO" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Extracted Jira ticket: $JIRA_TICKET from branch: $BRANCH_NAME"

      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.extract_jira.outputs.target_repo }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.head_ref || github.ref }}
          path: target-repo
          fetch-depth: 0

      - name: Checkout Conductor Repository
        uses: actions/checkout@v4
        with:
          repository: PeopleNet/agentic-ai-conductor
          path: conductor-repo
          fetch-depth: 1
          sparse-checkout: |
            conductor
            scripts
            templates
            gradle
            gradlew
            gradlew.bat
            .conductor

      - name: Copy Context Artifacts to Target Repo
        run: |
          if [ -d "conductor-repo/.conductor" ]; then
            echo "Copying .conductor/ context files to target repo..."
            cp -r conductor-repo/.conductor target-repo/.conductor
            echo "✅ Context files copied"
            ls -la target-repo/.conductor/
          else
            echo "⚠️  No .conductor/ directory found in conductor repo"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Verify Google API Key
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "${GOOGLE_API_KEY:-}" ]; then
            echo "::error::GOOGLE_API_KEY secret not configured. Add it in repository secrets."
            echo "::notice::Get your API key from https://aistudio.google.com/app/apikey"
            exit 1
          fi

      - name: Create Track
        id: create_track
        run: |
          cd conductor-repo
          chmod +x ./scripts/create_track.sh
          export GIT_REPO_PATH='${{ github.workspace }}/target-repo'
          output=$(./scripts/create_track.sh prod_req_verification ${{ steps.extract_jira.outputs.jira_ticket }})
          echo "$output"
          track_id=$(echo "$output" | tail -n 1)
          echo "track_id=$track_id" >> $GITHUB_OUTPUT
          echo "Created track: $track_id"

      - name: Execute Verification Gate
        run: |
          cd conductor-repo
          echo "🔍 Executing verification for Track ID: ${{ steps.create_track.outputs.track_id }}"
          
          # Suppress export command echoing
          set +x
          export GIT_REPO_PATH='${{ github.workspace }}/target-repo'
          export TECH_STACK='${{ github.event_name == 'workflow_dispatch' && inputs.tech_stack || 'unspecified' }}'
          export TARGET_ENV='staging'
          export BASE_REF='${{ github.event_name == 'workflow_dispatch' && inputs.base_ref || 'origin/develop' }}'
          export HEAD_REF='${{ github.event_name == 'workflow_dispatch' && inputs.head_ref || 'HEAD' }}'
          export JIRA_BASE_URL='${{ secrets.JIRA_BASE_URL }}'
          export JIRA_USERNAME='${{ secrets.JIRA_USERNAME }}'
          export JIRA_API_TOKEN='${{ secrets.JIRA_API_TOKEN }}'
          export GOOGLE_API_KEY='${{ secrets.GOOGLE_API_KEY }}'
          set -x
          
          ./gradlew :conductor:run --args="--track-id ${{ steps.create_track.outputs.track_id }}"

      - name: Upload Verification Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report-${{ steps.extract_jira.outputs.jira_ticket }}
          path: target-repo/.conductor/tracks/*/verification_report.md
          if-no-files-found: warn
