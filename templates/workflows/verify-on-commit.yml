# Add this file to ANY project to enable automated requirement verification
# Location: .github/workflows/verify-on-commit.yml
# 
# This workflow automatically verifies code changes against Jira requirements
# on every commit to feature/bugfix/chore/hotfix branches.

name: Verify Requirements

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'chore/**'
      - 'hotfix/**'
      - 'renovate/**'
      - 'renovate/all'
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  verify:
    name: Verify Against Jira Requirements
    runs-on: ubuntu-latest
    
    steps:
      - name: Extract Jira Ticket from Branch
        id: extract_jira
        env:
          RENOVATE_FALLBACK_JIRA: ${{ secrets.RENOVATE_FALLBACK_JIRA }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          JIRA_TICKET=$(echo "$BRANCH_NAME" | grep -oE '[A-Z]+-[0-9]+' | head -n 1)
          
          if [ -z "$JIRA_TICKET" ]; then
            if [[ "$BRANCH_NAME" == renovate/* ]]; then
              JIRA_TICKET=${RENOVATE_FALLBACK_JIRA:-RENOVATE-AUTO}
              echo "::notice::Branch '$BRANCH_NAME' treated as dependency update. Using fallback Jira ticket '$JIRA_TICKET'."
            else
              echo "❌ Error: Could not extract Jira ticket ID from branch name '$BRANCH_NAME'"
              echo "Branch name should contain a Jira ticket ID (e.g., WFPLUS-123)"
              exit 1
            fi
          fi
          
          echo "jira_ticket=$JIRA_TICKET" >> $GITHUB_OUTPUT
          echo "✅ Extracted Jira ticket: $JIRA_TICKET from branch: $BRANCH_NAME"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Conductor Repository
        uses: actions/checkout@v4
        with:
          repository: PeopleNet/agentic-ai-conductor
          path: conductor-repo
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}
          sparse-checkout: |
            conductor
            scripts
            templates
            gradle
            gradlew
            gradlew.bat
            .conductor

      - name: Copy Context Artifacts
        run: |
          if [ -d "conductor-repo/.conductor" ]; then
            echo "📋 Copying .conductor/ context files..."
            cp -r conductor-repo/.conductor .conductor
            echo "✅ Context files copied"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.GOOGLE_API_KEY }}" ]; then
            echo "❌ Error: GOOGLE_API_KEY secret not configured"
            echo "Please add organization-level secrets (see setup guide)"
            exit 1
          fi
          echo "✅ Secrets configured"

      - name: Create Track
        id: create_track
        run: |
          cd conductor-repo
          chmod +x ./scripts/create_track.sh
          export GIT_REPO_PATH='${{ github.workspace }}'
          output=$(./scripts/create_track.sh prod_req_verification ${{ steps.extract_jira.outputs.jira_ticket }})
          track_id=$(echo "$output" | tail -n 1)
          echo "track_id=$track_id" >> $GITHUB_OUTPUT
          echo "📦 Created track: $track_id"

      - name: Execute Verification Gate
        run: |
          cd conductor-repo
          echo "🔍 Verifying: ${{ steps.extract_jira.outputs.jira_ticket }}"
          echo "🎯 Environment: STAGING"
          
          export GIT_REPO_PATH='${{ github.workspace }}'
          export TECH_STACK='android'
          export TARGET_ENV='staging'
          export BASE_REF='origin/develop'
          export HEAD_REF='HEAD'
          export JIRA_BASE_URL='${{ secrets.JIRA_BASE_URL }}'
          export JIRA_USERNAME='${{ secrets.JIRA_USERNAME }}'
          export JIRA_API_TOKEN='${{ secrets.JIRA_API_TOKEN }}'
          export GOOGLE_API_KEY='${{ secrets.GOOGLE_API_KEY }}'
          
          ./gradlew :conductor:run --args="--track-id ${{ steps.create_track.outputs.track_id }}"

      - name: Upload Verification Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report-${{ steps.extract_jira.outputs.jira_ticket }}
          path: .conductor/tracks/*/verification_report.md
          if-no-files-found: warn
